<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOBBY</title>
    
    <!-- Favicon - from root favicon_io folder -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/favicon_io/site.webmanifest">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+Pro:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/v4-shims.min.css">
    
    <!-- Academicons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    
    <!-- CSS Files - from src/css (same directory as index.html) -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    
    <!-- Theme color -->
    <meta name="theme-color" content="#2880e3">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Hobby">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://weikangwang-hobby.github.io/">
    <meta property="og:image" content="/images/crow.jpg">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
        <div class="container">
            <div class="navbar-brand">
                <a href="#home" class="logo" aria-label="Home">
                    <span class="logo-text">Hobby</span>
                </a>
                
                <div class="navbar-menu" id="navbarMenu">
                    <ul class="nav-list" role="menubar">
                        <li role="none">
                            <a href="#about" class="nav-link" role="menuitem">About</a>
                        </li>
                        <li role="none">
                            <a href="#推理小说" class="nav-link" role="menuitem">推理小说</a>
                        </li>
                        <li role="none">
                            <a href="#模型" class="nav-link" role="menuitem">模型</a>
                        </li>
                        <li role="none">
                            <a href="#乐高" class="nav-link" role="menuitem">乐高</a>
                        </li>
                        <li role="none">
                            <a href="#车" class="nav-link" role="menuitem">车</a>
                        </li>
                        <li role="none">
                            <a href="#表" class="nav-link" role="menuitem">表</a>
                        </li>
                        <li role="none">
                            <a href="#游戏" class="nav-link" role="menuitem">游戏</a>
                        </li>
                        <li role="none">
                            <a href="#电影" class="nav-link" role="menuitem">电影</a>
                        </li>
                        <li role="none">
                            <a href="#电视剧" class="nav-link" role="menuitem">电视剧</a>
                        </li>
                    </ul>
                
                <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navbarMenu">
                    <span class="hamburger" aria-hidden="true"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container" id="main-content">
        <!-- About Section -->
        <section id="about" class="section" aria-labelledby="about-heading">
            <div class="profile-section">
                <!-- Left column: Photo and info -->
                <div class="profile-image">
                    <img src="/images/crow.jpg" 
                         alt="Rivendell" 
                         class="profile-photo"
                         loading="lazy"
                         width="160"
                         height="160">
                </div>
                
                <!-- Right column: Text and bio -->
                <div class="profile-text">
                    <h1 class="profile-name" id="about-heading">Rivendell
                        <span class="profile-title">我的兴趣小屋</span>
                    </h1>
                    
                    <div class="profile-bio">
                        <p>这里是我的兴趣爱好小屋，欢迎同好们浏览。爱好包括但不限于推理小说、模型、乐高、手表、车、游戏、电影等。
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Publications Section -->
        <section id="publications" class="section" aria-labelledby="publications-heading">
            <h2 class="section-title" id="publications-heading">Publications</h2>

            <!-- Publications Container -->
            <div class="publications-container" id="publicationsContainer">
                <!-- Dynamically loaded -->
                <div class="loading">Loading publications...</div>
            </div>
        </section>

        
    </main>



    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <i class="fas fa-chevron-up" aria-hidden="true"></i>
    </button>

    <!-- Publication Template (for dynamic rendering) -->
    <template id="publicationTemplate">
        <article class="publication" data-year="">
            <div class="publication-content">
                <h3 class="publication-title"></h3>
                
                <div class="publication-authors"></div>
                
                <div class="publication-venue">
                    <span class="venue-name"></span>, 
                    <span class="venue-year"></span>
                    <span class="publication-awards-inline"></span>
                    <span class="publication-note"></span>
                </div>
                
                <div class="publication-links"></div>
            </div>
            
            <div class="publication-media">
                <!-- Dynamically added images -->
            </div>
        </article>
    </template>

    <!-- JavaScript Modules -->
    <script type="module">
        // Import main application
        import { initWebsite } from './js/main.js';
        
        // Initialize website when DOM is loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initWebsite);
        } else {
            initWebsite();
        }
        
        // Update current year in footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>

    <!-- Fallback for browsers without JavaScript -->
    <noscript>
        <style>
            .navbar-menu { display: block !important; }
            .nav-toggle { display: none !important; }
            .loading { display: none !important; }
            [data-institution]::before {
                content: "[" attr(data-institution) "]";
                color: #666;
            }
        </style>
        <div class="noscript-warning">
            <p>This website requires JavaScript to function properly. Please enable JavaScript in your browser.</p>
        </div>
    </noscript>
</body>
</html>
